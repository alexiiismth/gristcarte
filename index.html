<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Grist - Carte polygones WKT</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  html, body { height: 100%; margin: 0; }
  #map { width: 100%; height: 100vh; }

  .photo-modal-overlay {
    position: fixed;
    inset: 0;

    display: flex;

  }
  .photo-modal {
    background: #fff;
    border-radius: 12px;

    max-height: 85vh;
    overflow: auto;
    position: relative;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }
  .photo-modal h3 {
    margin: 0 0 14px 0;

  }

  }
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 340px));
    justify-content: center;
    gap: 18px;
  }
  .photo-slot {
    display: flex;
    flex-direction: column;

  }
  .photo-slot img {
    max-width: 100%;
    max-height: 340px;
    width: auto;
    height: auto;
    object-fit: contain;
    border-radius: 8px;
    background: #f2f2f2;
    display: block;
    margin: 0 auto;
  }
  .photo-slot .no-photo {
    width: 100%;
    height: 260px;
    border-radius: 8px;
    background: #eee;
    display: flex;
    align-items: center;

    color: #999;

    padding: 10px;
    box-sizing: border-box;
  }
  .photo-slot .desc {
    margin-top: 8px;
    font-size: 12px;
    color: #444;
    text-align: center;
  }
  .fiche-modal {
    min-width: 320px;
  }
  .fiche-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
    border-bottom: 1px solid #ddd;
    padding-bottom: 8px;
  }
  .fiche-tab {
    background: #eee;
    border: none;
    padding: 6px 12px;
    border-radius: 6px 6px 0 0;

    cursor: pointer;
    color: #333;
  }
  .fiche-tab.active {
    background: #1565c0;
    color: #fff;
    font-weight: 600;
  }
  .modal-row {
    font-size: 14px;
    margin: 6px 0;
    color: #333;
  }
  .modal-row b { color: #000; }
</style>
</head>
<body>
<div id="map"></div>

<script>
// -------------------------------------------------------------------
// 1) Parsing WKT : gère POLYGON(...) et MULTIPOLYGON(...), avec trous
// -------------------------------------------------------------------

// Découpe une chaîne en groupes de parenthèses de niveau 1 : "(a),(b)" -> ["(a)","(b)"]
function splitTopLevelParens(str) {
  const result = [];
  let depth = 0, start = -1;
  for (let i = 0; i < str.length; i++) {
    const c = str[i];
    if (c === '(') {
      if (depth === 0) start = i;
      depth++;
    } else if (c === ')') {
      depth--;
      if (depth === 0) result.push(str.slice(start + 1, i)); // sans les parenthèses
    }
  }
  return result;
}

// "lon lat, lon lat, ..." -> [[lat,lon], [lat,lon], ...] (Leaflet veut [lat, lon])
function parseRing(ringStr) {
  return ringStr.split(',').map(pair => {
    const parts = pair.trim().split(/\s+/).map(Number);
    return [parts[1], parts[0]]; // inverse lon/lat -> lat/lon
  });
}

// Retourne un tableau de polygones Leaflet-ready : [ [ring1, ring2(trou), ...], ... ]
function parseWKT(wkt) {
  if (!wkt || typeof wkt !== 'string') return [];
  wkt = wkt.trim();
  const upper = wkt.toUpperCase();

  try {
    if (upper.startsWith('MULTIPOLYGON')) {
      const outer = wkt.slice(wkt.indexOf('(') + 1, wkt.lastIndexOf(')'));
      // outer = "((ring1),(ring2)),((ring1))"
      const polygons = splitTopLevelParens(outer);
      return polygons.map(polyStr => {
        const rings = splitTopLevelParens(polyStr);
        return rings.map(parseRing);
      });
    }
    if (upper.startsWith('POLYGON')) {
      const outer = wkt.slice(wkt.indexOf('(') + 1, wkt.lastIndexOf(')'));
      const rings = splitTopLevelParens(outer);
      return [rings.map(parseRing)];
    }
  } catch (e) {
    console.error('Erreur de parsing WKT:', wkt, e);
  }
  return [];
}

// -------------------------------------------------------------------
// 2) Initialisation de la carte
// -------------------------------------------------------------------

const map = L.map('map').setView([46.6, 2.4], 6); // vue par défaut : France
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let layerGroup = L.layerGroup().addTo(map);

// -------------------------------------------------------------------
// Gestion des images : soit une URL (texte), soit une colonne "Pièce jointe" Grist
// -------------------------------------------------------------------

// Récupère un jeton d'accès court terme pour construire les URLs de pièces jointes
async function getFreshAccessToken() {
  return await grist.docApi.getAccessToken({ readOnly: true });
}

function buildAttachmentUrl(tokenInfo, attachmentId) {
  return tokenInfo.baseUrl + '/attachments/' + attachmentId + '/download?auth=' + tokenInfo.token;
}

// value peut être : vide, une URL en texte, ou un tableau d'ids (colonne Pièce jointe Grist)
function resolveImageValue(value, tokenInfo) {
  if (!value) return '';
  if (Array.isArray(value)) {
    if (value.length === 0) return '';
    // Ignore un éventuel préfixe d'encodage Grist ('L' pour "list") si présent en première position
    const items = (value[0] === 'L') ? value.slice(1) : value;
    if (items.length === 0) return '';
    const first = items[0];
    const id = typeof first === 'number' ? first : (typeof first === 'string' && /^\d+$/.test(first) ? Number(first) : null);
    if (id !== null && tokenInfo) return buildAttachmentUrl(tokenInfo, id);
    return '';
  }
  return String(value).trim();
}

// Convertit un texte en nombre en gérant la virgule décimale française ("43,6047" -> 43.6047)
function parseFrenchNumber(value) {
  if (value === null || value === undefined || value === '') return NaN;
  if (typeof value === 'number') return value;
  return Number(String(value).trim().replace(',', '.'));
}

// Clé de regroupement d'une structure : par nom (prioritaire) sinon par coordonnées GPS arrondies
function structureGroupKey(mapped) {
  const name = (mapped.NomStructure || '').toString().trim().toLowerCase();
  if (name) return 'name:' + name;
  const lat = parseFrenchNumber(mapped.Latitude);
  const lng = parseFrenchNumber(mapped.Longitude);
  if (Number.isFinite(lat) && Number.isFinite(lng) && !(lat === 0 && lng === 0)) {
    return 'coord:' + lat.toFixed(5) + ',' + lng.toFixed(5);
  }
  return null;
}

// Essaie d'interpréter une date de visite (nombre Grist en secondes, texte JJ/MM/AAAA, ou texte générique)
function parseVisitDate(raw) {
  if (raw === null || raw === undefined || raw === '') return null;
  if (typeof raw === 'number') {
    const d = new Date(raw * 1000); // Grist encode les dates en secondes depuis epoch
    return isNaN(d.getTime()) ? null : d;
  }
  const str = String(raw).trim();
  const frMatch = str.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})$/);
  if (frMatch) {
    const d = new Date(parseInt(frMatch[3], 10), parseInt(frMatch[2], 10) - 1, parseInt(frMatch[1], 10));
    return isNaN(d.getTime()) ? null : d;
  }
  const d2 = new Date(str);
  return isNaN(d2.getTime()) ? null : d2;
}

// Construit le libellé d'onglet "Visite du JJ/MM/AAAA"
function formatVisitLabel(raw) {
  const d = parseVisitDate(raw);
  if (d) return 'Visite du ' + d.toLocaleDateString('fr-FR');
  if (raw) return 'Visite du ' + String(raw);
  return 'Visite (date inconnue)';
}

// Convertit une valeur quelconque (texte, email, référence Grist, liste) en texte lisible
function formatTextValue(value) {
  if (value === null || value === undefined || value === '') return '';
  if (Array.isArray(value)) {
    // Ignore un éventuel préfixe d'encodage Grist ('L' pour "list")
    const items = (value[0] === 'L') ? value.slice(1) : value;
    return items.map(formatTextValue).filter(Boolean).join(', ');
  }
  if (typeof value === 'object') {
    const name = value.name || value.Name || value.label || '';
    const email = value.email || value.Email || '';
    const combined = [name, email].filter(Boolean).join(' - ');
    return combined || JSON.stringify(value);
  }
  return String(value);
}

// Formate une date pour l'affichage : gère les nombres (colonnes Date Grist = secondes epoch) et le texte brut
function formatDateValue(value) {
  if (value === null || value === undefined || value === '') return '';
  if (typeof value === 'number') {
    const d = new Date(value * 1000);
    if (!isNaN(d.getTime())) return d.toLocaleDateString('fr-FR');
  }
  return String(value);
}

// Retourne une clé de tri (timestamp) pour ordonner les visites de la plus récente à la plus ancienne
function dateSortKey(value) {
  if (typeof value === 'number') return value;
  if (typeof value === 'string' && value.trim() !== '') {
    const parsed = Date.parse(value);
    if (!isNaN(parsed)) return parsed / 1000;
  }
  return -Infinity;
}

// Échappe le texte pour éviter de casser le HTML si un nom contient des caractères spéciaux
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Stockage global des photos par identifiant unique (évite les soucis d'échappement JSON dans le HTML)
window.__photoStore = {};
// Stockage global des fiches de visite complètes
window.__ficheStore = {};

// Résout une liste de photos (URL ou pièce jointe Grist) et retourne le HTML des emplacements
async function resolvePhotoSlotsHtml(photos) {
  let tokenInfo = null;
  let tokenError = '';
  try {
    tokenInfo = await getFreshAccessToken();
  } catch (e) {
    console.error('Impossible de récupérer le jeton d\'accès Grist pour les pièces jointes :', e);
    tokenError = 'Erreur d\'accès aux pièces jointes : ' + (e && e.message ? e.message : e);
  }

  return photos.map((p, i) => {
    const hasRawValue = Array.isArray(p.url) ? p.url.length > 0 : !!p.url;
    const src = resolveImageValue(p.url, tokenInfo);
    let img;
    if (src) {
      img = '<img src="' + escapeHtml(src) + '" alt="photo" onerror="this.replaceWith(Object.assign(document.createElement(\'div\'), {className:\'no-photo\', textContent:\'Image inaccessible (voir console)\'}))" />';
    } else if (hasRawValue && tokenError) {
      img = '<div class="no-photo">' + escapeHtml(tokenError) + '</div>';
      console.error('Photo ' + (i + 1) + ' : valeur brute présente mais non résolue ->', p.url);
    } else if (hasRawValue) {
      img = '<div class="no-photo">Format de pièce jointe non reconnu (voir console)</div>';
      console.error('Photo ' + (i + 1) + ' : format de valeur inattendu ->', p.url);
    } else {
      img = '<div class="no-photo">Aucune photo</div>';
    }
    const desc = '<div class="desc">' + escapeHtml(p.desc || '—') + '</div>';
    return '<div class="photo-slot">' + img + desc + '</div>';
  }).join('');
}

// Construit et affiche la fenêtre modale avec les photos + descriptions
window.showPhotoModal = async function (storeId, title) {
  window.closePhotoModal();

  const photos = window.__photoStore[storeId] || [];

  const overlay = document.createElement('div');
  overlay.className = 'photo-modal-overlay';
  overlay.id = 'photo-modal-overlay';
  overlay.onclick = function (e) { if (e.target === overlay) window.closePhotoModal(); };
  overlay.innerHTML =
    '<div class="photo-modal">' +
      '<button class="close-btn" onclick="window.closePhotoModal()">&times;</button>' +
      '<h3>' + escapeHtml(title || 'Photos') + '</h3>' +
      '<div class="photo-grid"><p>Chargement des photos…</p></div>' +
    '</div>';
  document.body.appendChild(overlay);

  const slotsHtml = await resolvePhotoSlotsHtml(photos);

  // Le modal peut avoir été fermé pendant le chargement ; on ne réinjecte que s'il est toujours ouvert
  const stillOpen = document.getElementById('photo-modal-overlay');
  if (stillOpen) {
    const grid = stillOpen.querySelector('.photo-grid');
    if (grid) grid.innerHTML = slotsHtml;
  }
};

// Construit et affiche la fiche de visite (une ou plusieurs visites, avec onglets si plusieurs)
window.showFicheModal = async function (storeId) {
  window.closePhotoModal();

  const group = window.__ficheStore[storeId];
  if (!group || !group.visits || group.visits.length === 0) return;

  const visits = group.visits;
  const showTabs = visits.length > 1;

  const tabsHtml = showTabs
    ? '<div class="fiche-tabs">' + visits.map((v, i) =>
        '<button class="fiche-tab' + (i === 0 ? ' active' : '') + '" onclick="window.__ficheSwitchTab(\'' + storeId + '\', ' + i + ', this)">' +
        escapeHtml(v.label) + '</button>'
      ).join('') + '</div>'
    : '';

  const overlay = document.createElement('div');
  overlay.className = 'photo-modal-overlay';
  overlay.id = 'photo-modal-overlay';
  overlay.onclick = function (e) { if (e.target === overlay) window.closePhotoModal(); };
  overlay.innerHTML =
    '<div class="photo-modal fiche-modal">' +
      '<button class="close-btn" onclick="window.closePhotoModal()">&times;</button>' +
      '<h3>📄 ' + (showTabs ? 'Fiches visites' : 'Fiche visite') + '</h3>' +
      tabsHtml +
      '<div id="fiche-content-area"><p>Chargement…</p></div>' +
    '</div>';
  document.body.appendChild(overlay);

  await window.__ficheRenderTab(storeId, 0);
};

// Affiche le contenu (infos + photos) d'une visite précise dans la fiche déjà ouverte
window.__ficheRenderTab = async function (storeId, idx) {
  const group = window.__ficheStore[storeId];
  if (!group) return;
  const visit = group.visits[idx];
  if (!visit) return;

  const rowsHtml =
    '<div class="modal-row"><b>Inspecteur(s) :</b> ' + escapeHtml(visit.data.inspecteurs || '—') + '</div>' +
    '<div class="modal-row"><b>Date de la visite :</b> ' + escapeHtml(visit.data.date || '—') + '</div>' +
    '<div class="modal-row"><b>Nom complet structure :</b> ' + escapeHtml(visit.data.nomComplet || '—') + '</div>' +
    '<div class="modal-row"><b>Description :</b> ' + escapeHtml(visit.data.description || '—') + '</div>' +
    '<div class="modal-row"><b>État structurel :</b> ' + escapeHtml(visit.data.etatStructurel || '—') + '</div>' +
    '<div class="modal-row"><b>État sécurité usager :</b> ' + escapeHtml(visit.data.etatSecurite || '—') + '</div>';

  const contentArea = document.getElementById('fiche-content-area');
  if (contentArea) {
    contentArea.innerHTML = rowsHtml + '<div class="photo-grid" style="margin-top:16px;"><p>Chargement des photos…</p></div>';
  }

  const slotsHtml = await resolvePhotoSlotsHtml(visit.data.photos);

  const stillOpen = document.getElementById('photo-modal-overlay');
  if (stillOpen) {
    const grid = stillOpen.querySelector('#fiche-content-area .photo-grid');
    if (grid) grid.innerHTML = slotsHtml;
  }
};

// Change l'onglet actif (visite affichée) dans la fiche
window.__ficheSwitchTab = function (storeId, idx, btnEl) {
  const overlay = document.getElementById('photo-modal-overlay');
  if (overlay) {
    overlay.querySelectorAll('.fiche-tab').forEach(btn => btn.classList.remove('active'));
    if (btnEl) btnEl.classList.add('active');
  }
  window.__ficheRenderTab(storeId, idx);
};

// Échappe une chaîne pour l'insérer en toute sécurité comme littéral JS entre apostrophes,
// utilisé dans les attributs onclick="..." (qui eux sont entre guillemets doubles)
function jsStringLiteral(str) {
  return "'" + String(str)
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/\n/g, ' ') + "'";
}

window.closePhotoModal = function () {
  const el = document.getElementById('photo-modal-overlay');
  if (el) el.remove();
};

// Attache un popup qui s'ouvre au survol et reste ouvert tant que la souris
// est sur la couche (marqueur ou polygone) OU sur l'encadré lui-même (pour pouvoir cliquer les boutons)
function attachHoverCard(layer, contentHtml, extraOptions) {
  layer.bindPopup(contentHtml, Object.assign({
    closeButton: true,
    autoClose: false,
    closeOnClick: false,
    className: 'structure-popup'
  }, extraOptions || {}));

  let closeTimer = null;
  const cancelClose = () => { if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; } };
  const scheduleClose = () => { closeTimer = setTimeout(() => layer.closePopup(), 250); };

  // Événements Leaflet (fonctionnent dans la plupart des cas)
  layer.on('mouseover', () => { cancelClose(); layer.openPopup(); });
  layer.on('mouseout', scheduleClose);

  // Renfort : écouteurs DOM natifs directement sur l'élément, plus fiables
  // avec certaines icônes personnalisées (image/SVG) selon les navigateurs
  layer.on('add', () => {
    const el = layer.getElement ? layer.getElement() : null;
    if (el) {
      el.addEventListener('mouseenter', () => { cancelClose(); layer.openPopup(); });
      el.addEventListener('mouseleave', scheduleClose);
    }
  });

  layer.on('popupopen', (e) => {
    const el = e.popup.getElement();
    if (el) {
      el.addEventListener('mouseenter', cancelClose);
      el.addEventListener('mouseleave', scheduleClose);
    }
  });
}

// Crée l'icône d'un marqueur "Structure" : soit une image fournie, soit un pin rouge par défaut
function createStructureIcon(imageUrl, color) {
  const url = imageUrl ? String(imageUrl).trim() : '';
  if (url !== '') {
    return L.icon({
      iconUrl: url,
      iconSize: [68, 68],      // taille x2 par rapport à avant (34 -> 68)
      iconAnchor: [34, 68],
      popupAnchor: [0, -68]
    });
  }

  // Pin SVG par défaut (rouge, ou couleur personnalisée si CouleurStructure est renseignée)
  const fill = color || '#e53935';
  const pinSvg =
    '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="40" viewBox="0 0 28 40">' +
    '<path d="M14 0C6.3 0 0 6.3 0 14c0 10.5 14 26 14 26s14-15.5 14-26C28 6.3 21.7 0 14 0z" ' +
    'fill="' + fill + '" stroke="#00000055" stroke-width="1"/>' +
    '<circle cx="14" cy="14" r="6" fill="#fff"/>' +
    '</svg>';

  return L.divIcon({
    html: pinSvg,
    className: '', // évite le style par défaut de Leaflet (fond blanc carré)
    iconSize: [28, 40],
    iconAnchor: [14, 40],
    popupAnchor: [0, -40]
  });
}

async function drawRecords(records, mappings) {
  layerGroup.clearLayers();
  const bounds = [];

  let tokenInfo = null;
  try {
    tokenInfo = await getFreshAccessToken();
  } catch (e) {
    console.error('Impossible de récupérer le jeton d\'accès Grist pour les pièces jointes :', e);
  }

  // Grilles d'évaluation : communes à toutes les structures, lues une seule fois depuis la 1ère ligne du tableau
  const grilleEvalGlobalId = 'grille-eval-global';
  if (records.length > 0) {
    const firstMapped = grist.mapColumnNames(records[0]) || records[0];
    window.__photoStore[grilleEvalGlobalId] = [
      { url: firstMapped.GrilleEval1Structure || '', desc: firstMapped.DescriptionGrilleEval1Structure || '' },
      { url: firstMapped.GrilleEval2Structure || '', desc: firstMapped.DescriptionGrilleEval2Structure || '' }
    ];
  }

  records.forEach((record, index) => {
    try {
      const mapped = grist.mapColumnNames(record) || record;

      // ------------------ Groupe "Domaine / Parc" (polygone) ------------------
      const wkt = mapped.PolygoneWKT;
      if (wkt && String(wkt).trim() !== '') {
        const polygons = parseWKT(wkt);
        const color = mapped.CouleurDomaine || '#2e7d32'; // vert par défaut
        const nomDomaine = mapped.NomDomaine || 'Domaine';
        const superficie = mapped.SuperficieDomaine || '—';
        const protection = mapped.ProtectionDomaine || '—';

        const photoDomaineId = 'photo-domaine-' + Math.random().toString(36).slice(2);
        window.__photoStore[photoDomaineId] = [
          { url: mapped.PhotoDomaine || '', desc: mapped.DescriptionPhotoDomaine || '' }
        ];

        const domaineCardHtml =
          '<div class="structure-card">' +
            '<h3>' + escapeHtml(nomDomaine) + '</h3>' +
            '<div class="row"><b>Est. Superficie (ha) :</b> ' + escapeHtml(superficie) + '</div>' +
            '<div class="row"><b>Protection(s) :</b> ' + escapeHtml(protection) + '</div>' +
            '<div class="buttons">' +
              '<a class="btn btn-fiche" href="#" onclick="event.preventDefault(); window.showPhotoModal(\'' + photoDomaineId + '\', ' + jsStringLiteral(nomDomaine) + ');">📷 Photo</a>' +
            '</div>' +
          '</div>';

        polygons.forEach(rings => {
          const poly = L.polygon(rings, {
            color: color,
            fillColor: color,
            fillOpacity: 0.35,
            weight: 2
          }).addTo(layerGroup);

          poly.on('mouseover', function () { this.setStyle({ weight: 3, fillOpacity: 0.55 }); });
          poly.on('mouseout', function () { this.setStyle({ weight: 2, fillOpacity: 0.35 }); });

          attachHoverCard(poly, domaineCardHtml, { closeButton: false });

          rings.forEach(ring => ring.forEach(pt => bounds.push(pt)));
        });
      }
    } catch (err) {
      // Une erreur sur cette ligne ne doit jamais empêcher l'affichage des autres
      console.error('Erreur (domaine) lors du traitement de la ligne ' + index + ' :', err, record);
    }
  });

  // ------------------ Groupe "Structure" (point) : regroupement par nom / coordonnées ------------------
  // Plusieurs lignes peuvent partager le même nom et/ou les mêmes coordonnées GPS : chaque ligne
  // supplémentaire est alors traitée comme une visite distincte de la même structure.
  const structureGroups = new Map();
  records.forEach((record, index) => {
    try {
      const mapped = grist.mapColumnNames(record) || record;
      const key = structureGroupKey(mapped);
      if (!key) return; // ni nom, ni coordonnées exploitables sur cette ligne
      if (!structureGroups.has(key)) structureGroups.set(key, []);
      structureGroups.get(key).push(mapped);
    } catch (err) {
      console.error('Erreur (regroupement structure) ligne ' + index + ' :', err, record);
    }
  });

  structureGroups.forEach((entries, key) => {
    try {
      // Choisit l'entrée "principale" : la première du groupe qui a des coordonnées valides
      let primary = null;
      for (const m of entries) {
        const la = parseFrenchNumber(m.Latitude);
        const lo = parseFrenchNumber(m.Longitude);
        if (Number.isFinite(la) && Number.isFinite(lo) && !(la === 0 && lo === 0)) {
          primary = { mapped: m, lat: la, lng: lo };
          break;
        }
      }
      if (!primary) return; // aucune coordonnée valide dans tout le groupe

      const mapped = primary.mapped;
      const lat = primary.lat;
      const lng = primary.lng;

      const color = mapped.CouleurStructure || null; // null -> rouge par défaut dans createStructureIcon
      const nom = mapped.NomStructure || 'Structure';
      const imageSrc = resolveImageValue(mapped.ImageStructure, tokenInfo);

      const marker = L.marker([lat, lng], {
        icon: createStructureIcon(imageSrc, color)
      }).addTo(layerGroup);

      const domaine = mapped.DomaineStructure || '—';
      const etat = mapped.EtatStructure || '—';
      const securite = mapped.SecuriteStructure || '—';
      const lienFiche = mapped.LienFicheStructure || '';
      const lienFormulaire = mapped.LienFormulaireStructure || '';
      const lienMaps = 'https://www.google.com/maps?q=' + lat + ',' + lng;

      // Construit la liste des visites : une entrée par ligne du groupe contenant des données de fiche
      const visits = [];
      entries.forEach(m => {
        const ficheInspecteurs = formatTextValue(m.InspecteursFiche);
        const ficheDate = m.DateVisiteFiche || '';
        const ficheNomComplet = m.NomCompletStructureFiche || '';
        const ficheDescription = m.DescriptionFiche || '';
        const ficheEtatStructurel = m.EtatStructurelFiche || '';
        const ficheEtatSecurite = m.EtatSecuriteUsagerFiche || '';
        const fichePhotos = [
          { url: m.PhotoFiche1 || '', desc: m.DescriptionPhotoFiche1 || '' },
          { url: m.PhotoFiche2 || '', desc: m.DescriptionPhotoFiche2 || '' },
          { url: m.PhotoFiche3 || '', desc: m.DescriptionPhotoFiche3 || '' },
          { url: m.PhotoFiche4 || '', desc: m.DescriptionPhotoFiche4 || '' },
          { url: m.PhotoFiche5 || '', desc: m.DescriptionPhotoFiche5 || '' }
        ];
        const fichePhotoPresente = fichePhotos.some(p => Array.isArray(p.url) ? p.url.length > 0 : !!p.url);
        const ficheExiste = !!(ficheInspecteurs || ficheDate || ficheNomComplet || ficheDescription ||
          ficheEtatStructurel || ficheEtatSecurite || fichePhotoPresente);
        if (!ficheExiste) return;

        visits.push({
          parsedDate: parseVisitDate(ficheDate),
          label: formatVisitLabel(ficheDate),
          data: {
            inspecteurs: ficheInspecteurs,
            date: ficheDate,
            nomComplet: ficheNomComplet,
            description: ficheDescription,
            etatStructurel: ficheEtatStructurel,
            etatSecurite: ficheEtatSecurite,
            photos: fichePhotos
          }
        });
      });

      // Trie les visites de la plus récente à la plus ancienne (les dates non reconnues passent en dernier)
      visits.sort((a, b) => {
        if (a.parsedDate && b.parsedDate) return b.parsedDate - a.parsedDate;
        if (a.parsedDate) return -1;
        if (b.parsedDate) return 1;
        return 0;
      });

      // Bouton "Voir la/les fiche(s)" : libellé au singulier ou pluriel selon le nombre de visites
      const warningId = 'warn-' + Math.random().toString(36).slice(2);
      const labelBouton = visits.length > 1 ? '📄 Voir les fiches visites' : '📄 Voir la fiche visite';
      let btnFiche, warningBox;

      if (lienFiche) {
        btnFiche = '<a class="btn btn-fiche" href="' + escapeHtml(lienFiche) + '" target="_blank" rel="noopener">' + labelBouton + '</a>';
        warningBox = '';
      } else if (visits.length > 0) {
        const ficheGroupId = 'fiche-group-' + Math.random().toString(36).slice(2);
        window.__ficheStore[ficheGroupId] = { visits: visits };
        btnFiche = '<a class="btn btn-fiche" href="#" onclick="event.preventDefault(); window.showFicheModal(\'' + ficheGroupId + '\');">' + labelBouton + '</a>';
        warningBox = '';
      } else {
        btnFiche = '<a class="btn btn-fiche" href="#" onclick="event.preventDefault(); document.getElementById(\'' + warningId + '\').classList.add(\'visible\');">' + labelBouton + '</a>';
        warningBox = '<div class="warning-box" id="' + warningId + '">Il n\'existe aucune fiche liée à cet ouvrage, veuillez en créer une pour accéder à ce paramètre.</div>';
      }

      // Stockage des 4 emplacements photo "initiale" de la structure (pris sur l'entrée principale)
      const photoStructureId = 'photo-structure-' + Math.random().toString(36).slice(2);
      window.__photoStore[photoStructureId] = [
        { url: mapped.Photo1Structure || '', desc: mapped.DescriptionPhoto1Structure || '' },
        { url: mapped.Photo2Structure || '', desc: mapped.DescriptionPhoto2Structure || '' },
        { url: mapped.Photo3Structure || '', desc: mapped.DescriptionPhoto3Structure || '' },
        { url: mapped.Photo4Structure || '', desc: mapped.DescriptionPhoto4Structure || '' }
      ];

      const cardHtml =
        '<div class="structure-card">' +
          '<h3>' + escapeHtml(nom) + '</h3>' +
          '<div class="row"><b>Domaine :</b> ' + escapeHtml(domaine) + '</div>' +
          '<div class="row"><b>État :</b> ' + escapeHtml(etat) + '</div>' +
          '<div class="row"><b>Sécurité :</b> ' + escapeHtml(securite) + '</div>' +
          '<div class="buttons">' +
            btnFiche +
            (lienFormulaire ? '<a class="btn btn-form" href="' + escapeHtml(lienFormulaire) + '" target="_blank" rel="noopener">➕ Créer une fiche visite</a>' : '') +
            '<a class="btn btn-maps" href="' + lienMaps + '" target="_blank" rel="noopener">🧭 Naviguer</a>' +
            '<a class="btn btn-fiche" href="#" onclick="event.preventDefault(); window.showPhotoModal(\'' + photoStructureId + '\', ' + jsStringLiteral(nom) + ');">📷 Photo(s) initial de la structure</a>' +
            '<a class="btn btn-form" href="#" onclick="event.preventDefault(); window.showPhotoModal(\'' + grilleEvalGlobalId + '\', ' + jsStringLiteral('Grilles d\'évaluation') + ');">📋 Grilles d\'évaluation Etat structurel / Etat sécurité usagers</a>' +
          '</div>' +
          warningBox +
        '</div>';

      attachHoverCard(marker, cardHtml);

      bounds.push([lat, lng]);
    } catch (err) {
      console.error('Erreur lors du traitement du groupe de structure "' + key + '" :', err);
    }
  });

  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [20, 20] });
  }
}

    { name: 'NomCompletStructureFiche', title: '🟥 Fiche visite — Nom complet structure', type: 'Text', optional: true },

    { name: 'PhotoFiche3', title: '🟥 Fiche visite — Photo 3', type: 'Text,Attachments', optional: true },
    { name: 'DescriptionPhotoFiche3', title: '🟥 Fiche visite — Description photo 3', type: 'Text', optional: true },
    { name: 'PhotoFiche4', title: '🟥 Fiche visite — Photo 4', type: 'Text,Attachments', optional: true },
    { name: 'DescriptionPhotoFiche4', title: '🟥 Fiche visite — Description photo 4', type: 'Text', optional: true },
    { name: 'PhotoFiche5', title: '🟥 Fiche visite — Photo 5', type: 'Text,Attachments', optional: true },
    { name: 'DescriptionPhotoFiche5', title: '🟥 Fiche visite — Description photo 5', type: 'Text', optional: true },
    { name: 'LienFormulaireStructure', title: '🟥 Structure — Lien formulaire (URL)', type: 'Text', optional: true,
      description: 'URL vers le formulaire "créer une fiche visite" (peut être la même URL pour toutes les lignes)' },
    { name: 'Photo1Structure', title: '🟥 Structure — Photo 1', type: 'Text,Attachments', optional: true,
      description: 'URL d\'une image OU colonne "Pièce jointe" Grist' },
    { name: 'DescriptionPhoto1Structure', title: '🟥 Structure — Description photo 1', type: 'Text', optional: true },
    { name: 'Photo2Structure', title: '🟥 Structure — Photo 2', type: 'Text,Attachments', optional: true,
      description: 'URL d\'une image OU colonne "Pièce jointe" Grist' },
    { name: 'DescriptionPhoto2Structure', title: '🟥 Structure — Description photo 2', type: 'Text', optional: true },
    { name: 'Photo3Structure', title: '🟥 Structure — Photo 3', type: 'Text,Attachments', optional: true,

    { name: 'Photo4Structure', title: '🟥 Structure — Photo 4', type: 'Text,Attachments', optional: true,
      description: 'URL d\'une image OU colonne "Pièce jointe" Grist' },

    { name: 'ImageStructure', title: '🟥 Structure — Image du pin', type: 'Text,Attachments', optional: true,
      description: 'URL d\'une image OU colonne "Pièce jointe" Grist (ex: pont). Si vide -> pin rouge par défaut.' },
    { name: 'GrilleEval1Structure', title: '🟥 Structure — Grille éval. 1 (État structurel)', type: 'Text,Attachments', optional: true,
      description: 'URL d\'une image OU colonne "Pièce jointe" Grist' },
    { name: 'DescriptionGrilleEval1Structure', title: '🟥 Structure — Description grille éval. 1', type: 'Text', optional: true },
    { name: 'GrilleEval2Structure', title: '🟥 Structure — Grille éval. 2 (Sécurité usagers)', type: 'Text,Attachments', optional: true,
      description: 'URL d\'une image OU colonne "Pièce jointe" Grist' },
    { name: 'DescriptionGrilleEval2Structure', title: '🟥 Structure — Description grille éval. 2', type: 'Text', optional: true },
    { name: 'CouleurStructure', title: '🟥 Structure — Couleur du pin', type: 'Text', optional: true,
      description: 'Utilisée seulement si pas d\'image. Ex : #1565c0 (sinon rouge par défaut)' }
  ],
  requiredAccess: 'full'
});

grist.onRecords((records, mappings) => drawRecords(records, mappings));
