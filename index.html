<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Grist - Carte polygones WKT</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  html, body { height: 100%; margin: 0; }
  #map { width: 100%; height: 100vh; }
</style>
</head>
<body>
<div id="map"></div>

<script>
// -------------------------------------------------------------------
// 1) Parsing WKT : gère POLYGON(...) et MULTIPOLYGON(...), avec trous
// -------------------------------------------------------------------

// Découpe une chaîne en groupes de parenthèses de niveau 1 : "(a),(b)" -> ["(a)","(b)"]
function splitTopLevelParens(str) {
  const result = [];
  let depth = 0, start = -1;
  for (let i = 0; i < str.length; i++) {
    const c = str[i];
    if (c === '(') {
      if (depth === 0) start = i;
      depth++;
    } else if (c === ')') {
      depth--;
      if (depth === 0) result.push(str.slice(start + 1, i)); // sans les parenthèses
    }
  }
  return result;
}

// "lon lat, lon lat, ..." -> [[lat,lon], [lat,lon], ...] (Leaflet veut [lat, lon])
function parseRing(ringStr) {
  return ringStr.split(',').map(pair => {
    const parts = pair.trim().split(/\s+/).map(Number);
    return [parts[1], parts[0]]; // inverse lon/lat -> lat/lon
  });
}

// Retourne un tableau de polygones Leaflet-ready : [ [ring1, ring2(trou), ...], ... ]
function parseWKT(wkt) {
  if (!wkt || typeof wkt !== 'string') return [];
  wkt = wkt.trim();
  const upper = wkt.toUpperCase();

  try {
    if (upper.startsWith('MULTIPOLYGON')) {
      const outer = wkt.slice(wkt.indexOf('(') + 1, wkt.lastIndexOf(')'));
      // outer = "((ring1),(ring2)),((ring1))"
      const polygons = splitTopLevelParens(outer);
      return polygons.map(polyStr => {
        const rings = splitTopLevelParens(polyStr);
        return rings.map(parseRing);
      });
    }
    if (upper.startsWith('POLYGON')) {
      const outer = wkt.slice(wkt.indexOf('(') + 1, wkt.lastIndexOf(')'));
      const rings = splitTopLevelParens(outer);
      return [rings.map(parseRing)];
    }
  } catch (e) {
    console.error('Erreur de parsing WKT:', wkt, e);
  }
  return [];
}

// -------------------------------------------------------------------
// 2) Initialisation de la carte
// -------------------------------------------------------------------

const map = L.map('map').setView([46.6, 2.4], 6); // vue par défaut : France
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let layerGroup = L.layerGroup().addTo(map);

function drawRecords(records, mappings) {
  layerGroup.clearLayers();
  const bounds = [];

  records.forEach(record => {
    const mapped = grist.mapColumnNames(record) || record;

    // ------------------ Groupe "Domaine / Parc" (polygone) ------------------
    const wkt = mapped.PolygoneWKT;
    if (wkt && String(wkt).trim() !== '') {
      const polygons = parseWKT(wkt);
      const color = mapped.CouleurDomaine || '#2e7d32'; // vert par défaut
      const label = mapped.NomDomaine || '';

      polygons.forEach(rings => {
        const poly = L.polygon(rings, {
          color: color,
          fillColor: color,
          fillOpacity: 0.35,
          weight: 2
        }).addTo(layerGroup);

        if (label) {
          poly.bindPopup(String(label));
          poly.bindTooltip(String(label), { sticky: true, direction: 'top' });
          poly.on('mouseover', function () { this.setStyle({ weight: 3, fillOpacity: 0.55 }); });
          poly.on('mouseout', function () { this.setStyle({ weight: 2, fillOpacity: 0.35 }); });
        }

        rings.forEach(ring => ring.forEach(pt => bounds.push(pt)));
      });
    }

    // ------------------ Groupe "Structure" (point) ------------------
    const lat = Number(mapped.Latitude);
    const lng = Number(mapped.Longitude);
    if (Number.isFinite(lat) && Number.isFinite(lng)) {
      const color = mapped.CouleurStructure || '#c62828'; // rouge par défaut
      const label = mapped.NomStructure || '';

      const marker = L.circleMarker([lat, lng], {
        radius: 8,
        color: color,
        fillColor: color,
        fillOpacity: 0.8,
        weight: 2
      }).addTo(layerGroup);

      if (label) {
        marker.bindPopup(String(label));
        marker.bindTooltip(String(label), { sticky: true, direction: 'top' });
      }

      bounds.push([lat, lng]);
    }
  });

  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [20, 20] });
  }
}

// -------------------------------------------------------------------
// 3) Connexion à Grist
// -------------------------------------------------------------------

grist.ready({
  columns: [
    // ---- Groupe "Domaine / Parc" (polygone) ----
    { name: 'NomDomaine', title: '🟩 Domaine/Parc — Nom', type: 'Text', optional: true,
      description: 'Nom du domaine ou du parc (affiché au survol du polygone)' },
    { name: 'PolygoneWKT', title: '🟩 Domaine/Parc — Polygone WKT', type: 'Text', optional: true,
      description: 'MULTIPOLYGON(((...))) ou POLYGON(((...)))' },
    { name: 'CouleurDomaine', title: '🟩 Domaine/Parc — Couleur', type: 'Text', optional: true,
      description: 'Ex : #2e7d32 ou green (optionnel, vert par défaut)' },

    // ---- Groupe "Structure" (point) ----
    { name: 'NomStructure', title: '🟥 Structure — Nom', type: 'Text', optional: true,
      description: 'Nom de la structure (affiché au survol du point)' },
    { name: 'Latitude', title: '🟥 Structure — Latitude', type: 'Numeric', optional: true },
    { name: 'Longitude', title: '🟥 Structure — Longitude', type: 'Numeric', optional: true },
    { name: 'CouleurStructure', title: '🟥 Structure — Couleur', type: 'Text', optional: true,
      description: 'Ex : #c62828 ou red (optionnel, rouge par défaut)' }
  ],
  requiredAccess: 'read table'
});

grist.onRecords((records, mappings) => drawRecords(records, mappings));
</script>
</body>
</html>
