<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Grist - Carte polygones WKT</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  html, body { height: 100%; margin: 0; }
  #map { width: 100%; height: 100vh; }

  .structure-popup .leaflet-popup-content-wrapper {
    border-radius: 10px;
    padding: 0;
  }
  .structure-popup .leaflet-popup-content {
    margin: 0;
    width: 260px !important;
  }
  .structure-card {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    padding: 12px 14px;
  }
  .structure-card h3 {
    margin: 0 0 8px 0;
    font-size: 16px;
    color: #1a1a1a;
  }
  .structure-card .row {
    font-size: 13px;
    margin: 4px 0;
    color: #333;
  }
  .structure-card .row b { color: #000; }
  .structure-card .buttons {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .structure-card .btn {
    display: block;
    text-align: center;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 10px;
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
  }
  .structure-card .btn-fiche { background: #1565c0; }
  .structure-card .btn-form { background: #2e7d32; }
  .structure-card .btn-maps { background: #616161; }

  .structure-card .warning-box {
    display: none;
    margin-top: 8px;
    padding: 8px 10px;
    background: #fff3e0;
    border: 1px solid #ffb74d;
    border-radius: 6px;
    font-size: 12px;
    color: #7a4a00;
  }
  .structure-card .warning-box.visible { display: block; }

  .photo-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .photo-modal {
    background: #fff;
    border-radius: 12px;
    padding: 22px;
    max-width: 90vw;
    max-height: 85vh;
    overflow: auto;
    position: relative;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }
  .photo-modal h3 {
    margin: 0 0 14px 0;
    font-size: 18px;
    padding-right: 24px;
  }
  .photo-modal .close-btn {
    position: absolute;
    top: 10px;
    right: 14px;
    cursor: pointer;
    font-size: 22px;
    line-height: 1;
    background: none;
    border: none;
    color: #555;
  }
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(200px, 260px));
    gap: 18px;
  }
  .photo-grid.single {
    grid-template-columns: minmax(200px, 320px);
  }
  .photo-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .photo-slot img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 8px;
    background: #eee;
  }
  .photo-slot .no-photo {
    width: 100%;
    height: 180px;
    border-radius: 8px;
    background: #eee;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    font-size: 13px;
    text-align: center;
    padding: 10px;
    box-sizing: border-box;
  }
  .photo-slot .desc {
    margin-top: 8px;
    font-size: 12px;
    color: #444;
    text-align: center;
  }
</style>
</head>
<body>
<div id="map"></div>

<script>
// -------------------------------------------------------------------
// 1) Parsing WKT : gère POLYGON(...) et MULTIPOLYGON(...), avec trous
// -------------------------------------------------------------------

// Découpe une chaîne en groupes de parenthèses de niveau 1 : "(a),(b)" -> ["(a)","(b)"]
function splitTopLevelParens(str) {
  const result = [];
  let depth = 0, start = -1;
  for (let i = 0; i < str.length; i++) {
    const c = str[i];
    if (c === '(') {
      if (depth === 0) start = i;
      depth++;
    } else if (c === ')') {
      depth--;
      if (depth === 0) result.push(str.slice(start + 1, i)); // sans les parenthèses
    }
  }
  return result;
}

// "lon lat, lon lat, ..." -> [[lat,lon], [lat,lon], ...] (Leaflet veut [lat, lon])
function parseRing(ringStr) {
  return ringStr.split(',').map(pair => {
    const parts = pair.trim().split(/\s+/).map(Number);
    return [parts[1], parts[0]]; // inverse lon/lat -> lat/lon
  });
}

// Retourne un tableau de polygones Leaflet-ready : [ [ring1, ring2(trou), ...], ... ]
function parseWKT(wkt) {
  if (!wkt || typeof wkt !== 'string') return [];
  wkt = wkt.trim();
  const upper = wkt.toUpperCase();

  try {
    if (upper.startsWith('MULTIPOLYGON')) {
      const outer = wkt.slice(wkt.indexOf('(') + 1, wkt.lastIndexOf(')'));
      // outer = "((ring1),(ring2)),((ring1))"
      const polygons = splitTopLevelParens(outer);
      return polygons.map(polyStr => {
        const rings = splitTopLevelParens(polyStr);
        return rings.map(parseRing);
      });
    }
    if (upper.startsWith('POLYGON')) {
      const outer = wkt.slice(wkt.indexOf('(') + 1, wkt.lastIndexOf(')'));
      const rings = splitTopLevelParens(outer);
      return [rings.map(parseRing)];
    }
  } catch (e) {
    console.error('Erreur de parsing WKT:', wkt, e);
  }
  return [];
}

// -------------------------------------------------------------------
// 2) Initialisation de la carte
// -------------------------------------------------------------------

const map = L.map('map').setView([46.6, 2.4], 6); // vue par défaut : France
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let layerGroup = L.layerGroup().addTo(map);

// -------------------------------------------------------------------
// Gestion des images : soit une URL (texte), soit une colonne "Pièce jointe" Grist
// -------------------------------------------------------------------

// Récupère un jeton d'accès court terme pour construire les URLs de pièces jointes
async function getFreshAccessToken() {
  return await grist.docApi.getAccessToken({ readOnly: true });
}

function buildAttachmentUrl(tokenInfo, attachmentId) {
  return tokenInfo.baseUrl + '/attachments/' + attachmentId + '/download?auth=' + tokenInfo.token;
}

// value peut être : vide, une URL en texte, ou un tableau d'ids (colonne Pièce jointe Grist)
function resolveImageValue(value, tokenInfo) {
  if (!value) return '';
  if (Array.isArray(value)) {
    if (value.length === 0) return '';
    // Ignore un éventuel préfixe d'encodage Grist ('L' pour "list") si présent en première position
    const items = (value[0] === 'L') ? value.slice(1) : value;
    if (items.length === 0) return '';
    const first = items[0];
    const id = typeof first === 'number' ? first : (typeof first === 'string' && /^\d+$/.test(first) ? Number(first) : null);
    if (id !== null && tokenInfo) return buildAttachmentUrl(tokenInfo, id);
    return '';
  }
  return String(value).trim();
}

// Convertit un texte en nombre en gérant la virgule décimale française ("43,6047" -> 43.6047)
function parseFrenchNumber(value) {
  if (value === null || value === undefined || value === '') return NaN;
  if (typeof value === 'number') return value;
  return Number(String(value).trim().replace(',', '.'));
}

// Échappe le texte pour éviter de casser le HTML si un nom contient des caractères spéciaux
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Stockage global des photos par identifiant unique (évite les soucis d'échappement JSON dans le HTML)
window.__photoStore = {};

// Construit et affiche la fenêtre modale avec les photos + descriptions
window.showPhotoModal = async function (storeId, title) {
  window.closePhotoModal();

  const photos = window.__photoStore[storeId] || [];
  const gridClass = photos.length <= 1 ? 'photo-grid single' : 'photo-grid';

  // Affiche d'abord un état "chargement" pendant qu'on résout les URLs des pièces jointes
  const overlay = document.createElement('div');
  overlay.className = 'photo-modal-overlay';
  overlay.id = 'photo-modal-overlay';
  overlay.onclick = function (e) { if (e.target === overlay) window.closePhotoModal(); };
  overlay.innerHTML =
    '<div class="photo-modal">' +
      '<button class="close-btn" onclick="window.closePhotoModal()">&times;</button>' +
      '<h3>' + escapeHtml(title || 'Photos') + '</h3>' +
      '<div class="' + gridClass + '"><p>Chargement des photos…</p></div>' +
    '</div>';
  document.body.appendChild(overlay);

  // Résout chaque photo : soit une URL texte, soit une pièce jointe Grist (nécessite un jeton)
  let tokenInfo = null;
  let tokenError = '';
  try {
    tokenInfo = await getFreshAccessToken();
  } catch (e) {
    console.error('Impossible de récupérer le jeton d\'accès Grist pour les pièces jointes :', e);
    tokenError = 'Erreur d\'accès aux pièces jointes : ' + (e && e.message ? e.message : e);
  }

  const slotsHtml = photos.map((p, i) => {
    const hasRawValue = Array.isArray(p.url) ? p.url.length > 0 : !!p.url;
    const src = resolveImageValue(p.url, tokenInfo);
    let img;
    if (src) {
      img = '<img src="' + escapeHtml(src) + '" alt="photo" onerror="this.replaceWith(Object.assign(document.createElement(\'div\'), {className:\'no-photo\', textContent:\'Image inaccessible (voir console)\'}))" />';
    } else if (hasRawValue && tokenError) {
      img = '<div class="no-photo">' + escapeHtml(tokenError) + '</div>';
      console.error('Photo ' + (i + 1) + ' : valeur brute présente mais non résolue ->', p.url);
    } else if (hasRawValue) {
      img = '<div class="no-photo">Format de pièce jointe non reconnu (voir console)</div>';
      console.error('Photo ' + (i + 1) + ' : format de valeur inattendu ->', p.url);
    } else {
      img = '<div class="no-photo">Aucune photo</div>';
    }
    const desc = p.desc ? '<div class="desc">' + escapeHtml(p.desc) + '</div>' : '';
    return '<div class="photo-slot">' + img + desc + '</div>';
  }).join('');

  // Le modal peut avoir été fermé pendant le chargement ; on ne réinjecte que s'il est toujours ouvert
  const stillOpen = document.getElementById('photo-modal-overlay');
  if (stillOpen) {
    const grid = stillOpen.querySelector('.' + gridClass.split(' ').join('.'));
    if (grid) grid.innerHTML = slotsHtml;
  }
};

// Échappe une chaîne pour l'insérer en toute sécurité comme littéral JS entre apostrophes,
// utilisé dans les attributs onclick="..." (qui eux sont entre guillemets doubles)
function jsStringLiteral(str) {
  return "'" + String(str)
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/\n/g, ' ') + "'";
}

window.closePhotoModal = function () {
  const el = document.getElementById('photo-modal-overlay');
  if (el) el.remove();
};

// Attache un popup qui s'ouvre au survol et reste ouvert tant que la souris
// est sur la couche (marqueur ou polygone) OU sur l'encadré lui-même (pour pouvoir cliquer les boutons)
function attachHoverCard(layer, contentHtml, extraOptions) {
  layer.bindPopup(contentHtml, Object.assign({
    closeButton: true,
    autoClose: false,
    closeOnClick: false,
    className: 'structure-popup'
  }, extraOptions || {}));

  let closeTimer = null;
  const cancelClose = () => { if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; } };
  const scheduleClose = () => { closeTimer = setTimeout(() => layer.closePopup(), 250); };

  // Événements Leaflet (fonctionnent dans la plupart des cas)
  layer.on('mouseover', () => { cancelClose(); layer.openPopup(); });
  layer.on('mouseout', scheduleClose);

  // Renfort : écouteurs DOM natifs directement sur l'élément, plus fiables
  // avec certaines icônes personnalisées (image/SVG) selon les navigateurs
  layer.on('add', () => {
    const el = layer.getElement ? layer.getElement() : null;
    if (el) {
      el.addEventListener('mouseenter', () => { cancelClose(); layer.openPopup(); });
      el.addEventListener('mouseleave', scheduleClose);
    }
  });

  layer.on('popupopen', (e) => {
    const el = e.popup.getElement();
    if (el) {
      el.addEventListener('mouseenter', cancelClose);
      el.addEventListener('mouseleave', scheduleClose);
    }
  });
}

// Crée l'icône d'un marqueur "Structure" : soit une image fournie, soit un pin rouge par défaut
function createStructureIcon(imageUrl, color) {
  const url = imageUrl ? String(imageUrl).trim() : '';
  if (url !== '') {
    return L.icon({
      iconUrl: url,
      iconSize: [68, 68],      // taille x2 par rapport à avant (34 -> 68)
      iconAnchor: [34, 68],
      popupAnchor: [0, -68]
    });
  }

  // Pin SVG par défaut (rouge, ou couleur personnalisée si CouleurStructure est renseignée)
  const fill = color || '#e53935';
  const pinSvg =
    '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="40" viewBox="0 0 28 40">' +
    '<path d="M14 0C6.3 0 0 6.3 0 14c0 10.5 14 26 14 26s14-15.5 14-26C28 6.3 21.7 0 14 0z" ' +
    'fill="' + fill + '" stroke="#00000055" stroke-width="1"/>' +
    '<circle cx="14" cy="14" r="6" fill="#fff"/>' +
    '</svg>';

  return L.divIcon({
    html: pinSvg,
    className: '', // évite le style par défaut de Leaflet (fond blanc carré)
    iconSize: [28, 40],
    iconAnchor: [14, 40],
    popupAnchor: [0, -40]
  });
}

async function drawRecords(records, mappings) {
  layerGroup.clearLayers();
  const bounds = [];

  let tokenInfo = null;
  try {
    tokenInfo = await getFreshAccessToken();
  } catch (e) {
    console.error('Impossible de récupérer le jeton d\'accès Grist pour les pièces jointes :', e);
  }

  records.forEach((record, index) => {
    try {
      const mapped = grist.mapColumnNames(record) || record;

      // ------------------ Groupe "Domaine / Parc" (polygone) ------------------
      const wkt = mapped.PolygoneWKT;
      if (wkt && String(wkt).trim() !== '') {
        const polygons = parseWKT(wkt);
        const color = mapped.CouleurDomaine || '#2e7d32'; // vert par défaut
        const nomDomaine = mapped.NomDomaine || 'Domaine';
        const superficie = mapped.SuperficieDomaine || '—';
        const protection = mapped.ProtectionDomaine || '—';

        const photoDomaineId = 'photo-domaine-' + Math.random().toString(36).slice(2);
        window.__photoStore[photoDomaineId] = [
          { url: mapped.PhotoDomaine || '', desc: mapped.DescriptionPhotoDomaine || '' }
        ];

        const domaineCardHtml =
          '<div class="structure-card">' +
            '<h3>' + escapeHtml(nomDomaine) + '</h3>' +
            '<div class="row"><b>Est. Superficie (ha) :</b> ' + escapeHtml(superficie) + '</div>' +
            '<div class="row"><b>Protection(s) :</b> ' + escapeHtml(protection) + '</div>' +
            '<div class="buttons">' +
              '<a class="btn btn-fiche" href="#" onclick="event.preventDefault(); window.showPhotoModal(\'' + photoDomaineId + '\', ' + jsStringLiteral(nomDomaine) + ');">📷 Photo</a>' +
            '</div>' +
          '</div>';

        polygons.forEach(rings => {
          const poly = L.polygon(rings, {
            color: color,
            fillColor: color,
            fillOpacity: 0.35,
            weight: 2
          }).addTo(layerGroup);

          poly.on('mouseover', function () { this.setStyle({ weight: 3, fillOpacity: 0.55 }); });
          poly.on('mouseout', function () { this.setStyle({ weight: 2, fillOpacity: 0.35 }); });

          attachHoverCard(poly, domaineCardHtml, { closeButton: false });

          rings.forEach(ring => ring.forEach(pt => bounds.push(pt)));
        });
      }

      // ------------------ Groupe "Structure" (point) ------------------
      const lat = parseFrenchNumber(mapped.Latitude);
      const lng = parseFrenchNumber(mapped.Longitude);
      // (0,0) = cellule vide interprétée par Grist comme 0 -> on l'ignore (sinon un pin apparaît au milieu de l'océan)
      const hasValidCoords = Number.isFinite(lat) && Number.isFinite(lng) && !(lat === 0 && lng === 0);
      if (hasValidCoords) {
        const color = mapped.CouleurStructure || null; // null -> rouge par défaut dans createStructureIcon
        const nom = mapped.NomStructure || 'Structure';
        const imageSrc = resolveImageValue(mapped.ImageStructure, tokenInfo);

        const marker = L.marker([lat, lng], {
          icon: createStructureIcon(imageSrc, color)
        }).addTo(layerGroup);

        const domaine = mapped.DomaineStructure || '—';
        const etat = mapped.EtatStructure || '—';
        const securite = mapped.SecuriteStructure || '—';
        const lienFiche = mapped.LienFicheStructure || '';
        const lienFormulaire = mapped.LienFormulaireStructure || '';
        const lienMaps = 'https://www.google.com/maps?q=' + lat + ',' + lng;

        // Bouton "Voir la fiche" : lien normal si une fiche existe, sinon affiche un message inline (pas d'alerte navigateur)
        const warningId = 'warn-' + Math.random().toString(36).slice(2);
        const btnFiche = lienFiche
          ? '<a class="btn btn-fiche" href="' + escapeHtml(lienFiche) + '" target="_blank" rel="noopener">📄 Voir la fiche</a>'
          : '<a class="btn btn-fiche" href="#" onclick="event.preventDefault(); document.getElementById(\'' + warningId + '\').classList.add(\'visible\');">📄 Voir la fiche</a>';

        const warningBox = lienFiche
          ? ''
          : '<div class="warning-box" id="' + warningId + '">Il n\'existe aucune fiche liée à cet ouvrage, veuillez en créer une pour accéder à ce paramètre.</div>';

        // Stockage des 4 emplacements photo de la structure
        const photoStructureId = 'photo-structure-' + Math.random().toString(36).slice(2);
        window.__photoStore[photoStructureId] = [
          { url: mapped.Photo1Structure || '', desc: mapped.DescriptionPhoto1Structure || '' },
          { url: mapped.Photo2Structure || '', desc: mapped.DescriptionPhoto2Structure || '' },
          { url: mapped.Photo3Structure || '', desc: mapped.DescriptionPhoto3Structure || '' },
          { url: mapped.Photo4Structure || '', desc: mapped.DescriptionPhoto4Structure || '' }
        ];

        const cardHtml =
          '<div class="structure-card">' +
            '<h3>' + escapeHtml(nom) + '</h3>' +
            '<div class="row"><b>Domaine :</b> ' + escapeHtml(domaine) + '</div>' +
            '<div class="row"><b>État :</b> ' + escapeHtml(etat) + '</div>' +
            '<div class="row"><b>Sécurité :</b> ' + escapeHtml(securite) + '</div>' +
            '<div class="buttons">' +
              btnFiche +
              (lienFormulaire ? '<a class="btn btn-form" href="' + escapeHtml(lienFormulaire) + '" target="_blank" rel="noopener">➕ Créer une fiche visite</a>' : '') +
              '<a class="btn btn-maps" href="' + lienMaps + '" target="_blank" rel="noopener">🧭 Naviguer</a>' +
              '<a class="btn btn-fiche" href="#" onclick="event.preventDefault(); window.showPhotoModal(\'' + photoStructureId + '\', ' + jsStringLiteral(nom) + ');">📷 Photo(s) initial de la structure</a>' +
            '</div>' +
            warningBox +
          '</div>';

        attachHoverCard(marker, cardHtml);

        bounds.push([lat, lng]);
      }
    } catch (err) {
      // Une erreur sur cette ligne ne doit jamais empêcher l'affichage des autres
      console.error('Erreur lors du traitement de la ligne ' + index + ' :', err, record);
    }
  });

  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [20, 20] });
  }
}

// -------------------------------------------------------------------
// 3) Connexion à Grist
// -------------------------------------------------------------------

grist.ready({
  columns: [
    // ---- Groupe "Domaine / Parc" (polygone) ----
    { name: 'NomDomaine', title: '🟩 Domaine/Parc — Nom', type: 'Text', optional: true,
      description: 'Nom du domaine ou du parc (affiché au survol du polygone)' },
    { name: 'PolygoneWKT', title: '🟩 Domaine/Parc — Polygone WKT', type: 'Text', optional: true,
      description: 'MULTIPOLYGON(((...))) ou POLYGON(((...)))' },
    { name: 'CouleurDomaine', title: '🟩 Domaine/Parc — Couleur', type: 'Text', optional: true,
      description: 'Ex : #2e7d32 ou green (optionnel, vert par défaut)' },
    { name: 'SuperficieDomaine', title: '🟩 Domaine/Parc — Superficie', type: 'Text,Numeric,Int,Any', optional: true,
      description: 'Ex : 12 ha ou 120 000 m²' },
    { name: 'ProtectionDomaine', title: '🟩 Domaine/Parc — Protection', type: 'Text', optional: true,
      description: 'Ex : Site classé, Natura 2000...' },
    { name: 'PhotoDomaine', title: '🟩 Domaine/Parc — Photo', type: 'Text,Attachments', optional: true,
      description: 'URL d\'une image OU colonne "Pièce jointe" Grist (upload direct)' },
    { name: 'DescriptionPhotoDomaine', title: '🟩 Domaine/Parc — Description photo', type: 'Text', optional: true,
      description: 'Légende affichée sous la photo' },

    // ---- Groupe "Structure" (point) ----
    { name: 'NomStructure', title: '🟥 Structure — Nom', type: 'Text', optional: true,
      description: 'Nom de la structure (titre de l\'encadré au survol)' },
    { name: 'Latitude', title: '🟥 Structure — Latitude', type: 'Numeric,Int,Text,Any', optional: true },
    { name: 'Longitude', title: '🟥 Structure — Longitude', type: 'Numeric,Int,Text,Any', optional: true },
    { name: 'DomaineStructure', title: '🟥 Structure — Domaine', type: 'Text', optional: true,
      description: 'Domaine/parc auquel appartient la structure' },
    { name: 'EtatStructure', title: '🟥 Structure — État', type: 'Text', optional: true,
      description: 'Ex : Bon état, À surveiller, Dégradé...' },
    { name: 'SecuriteStructure', title: '🟥 Structure — Sécurité', type: 'Text', optional: true,
      description: 'Ex : Sécurisée, À risque...' },
    { name: 'LienFicheStructure', title: '🟥 Structure — Lien fiche visite (URL)', type: 'Text', optional: true,
      description: 'URL vers la fiche visite existante de cette structure' },
    { name: 'LienFormulaireStructure', title: '🟥 Structure — Lien formulaire (URL)', type: 'Text', optional: true,
      description: 'URL vers le formulaire "créer une fiche visite" (peut être la même URL pour toutes les lignes)' },
    { name: 'Photo1Structure', title: '🟥 Structure — Photo 1', type: 'Text,Attachments', optional: true,
      description: 'URL d\'une image OU colonne "Pièce jointe" Grist' },
    { name: 'DescriptionPhoto1Structure', title: '🟥 Structure — Description photo 1', type: 'Text', optional: true },
    { name: 'Photo2Structure', title: '🟥 Structure — Photo 2', type: 'Text,Attachments', optional: true,
      description: 'URL d\'une image OU colonne "Pièce jointe" Grist' },
    { name: 'DescriptionPhoto2Structure', title: '🟥 Structure — Description photo 2', type: 'Text', optional: true },
    { name: 'Photo3Structure', title: '🟥 Structure — Photo 3', type: 'Text,Attachments', optional: true,
      description: 'URL d\'une image OU colonne "Pièce jointe" Grist' },
    { name: 'DescriptionPhoto3Structure', title: '🟥 Structure — Description photo 3', type: 'Text', optional: true },
    { name: 'Photo4Structure', title: '🟥 Structure — Photo 4', type: 'Text,Attachments', optional: true,
      description: 'URL d\'une image OU colonne "Pièce jointe" Grist' },
    { name: 'DescriptionPhoto4Structure', title: '🟥 Structure — Description photo 4', type: 'Text', optional: true },
    { name: 'ImageStructure', title: '🟥 Structure — Image du pin', type: 'Text,Attachments', optional: true,
      description: 'URL d\'une image OU colonne "Pièce jointe" Grist (ex: pont). Si vide -> pin rouge par défaut.' },
    { name: 'CouleurStructure', title: '🟥 Structure — Couleur du pin', type: 'Text', optional: true,
      description: 'Utilisée seulement si pas d\'image. Ex : #1565c0 (sinon rouge par défaut)' }
  ],
  requiredAccess: 'full'
});

grist.onRecords((records, mappings) => drawRecords(records, mappings));
